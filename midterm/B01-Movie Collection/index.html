<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault - Movie Collection</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-version="b01-v2.1-use-fetch-wrapper">
    <div class="page-layout">
        <!-- Header -->
        <header class="header">
            <h1>CineVault</h1>
            <p class="subtitle">Your Personal Movie Collection</p>
        </header>

        <!-- Filter Section -->
        <section class="filter-section">
            <h2>Filter by Genre</h2>
            <div class="filter-controls">
                <div class="filter-group">
                    <select id="genreFilter" class="filter-select">
                        <option value="">All Genres</option>
                        <!-- Options will be populated from /categories/movies API -->
                    </select>
                </div>
            </div>
        </section>

        <!-- Movies Grid -->
        <section class="grid-section">
            <h2>Movies</h2>
            <div id="moviesGrid" class="movies-grid">
                <!-- Render movie cards here using JavaScript. Example card structure:
                <div class="movie-card" data-id="1" data-genre="Sci-Fi">
                    <div class="movie-rating">
                        <span class="rating-stars">★★★★☆</span>
                        <span class="rating-number">9 out of 10</span>
                    </div>
                    <div class="movie-info">
                        <h3 class="movie-title">Inception</h3>
                        <span class="movie-genre">Genre: Sci-Fi</span>
                        <span class="badge badge-watched">Watched</span>
                    </div>
                    <div class="movie-actions actions">
                        <button class="edit-btn btn-small" aria-label="Edit Inception">Edit</button>
                        <button class="delete-btn btn-small" aria-label="Remove Inception">Remove</button>
                    </div>
                </div>
                -->
            </div>
            <p id="emptyMessage" class="empty-message" style="display:none;">No movies found.</p>
        </section>

        <!-- Form Section -->
        <aside class="form-section">
            <h2>Edit Movie</h2>
            <form id="movieForm">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Movie title" required>
                </div>
                <div class="form-group">
                    <label for="rating">Rating (0-10)</label>
                    <input type="number" id="rating" min="0" max="10" placeholder="0" value="0">
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status">
                        <option value="watched">Watched</option>
                        <option value="watchlist">Watchlist</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <select id="genre">
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Animation">Animation</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Horror">Horror</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Documentary">Documentary</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" id="submitBtn" class="btn btn-primary">Update Movie</button>
                    <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </aside>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 CineVault. Built with care for cinema lovers.</p>
        </footer>
    </div>
